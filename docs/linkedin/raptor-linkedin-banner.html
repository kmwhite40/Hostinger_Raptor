<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Raptor Solutions — LinkedIn Banner 1584×396</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --obsidian: oklch(0.13 0.008 220);
    --bone:     oklch(0.95 0.012 90);
    --iron:     oklch(0.42 0.01 220);
    --steel:    oklch(0.72 0.008 220);
    --vermilion:oklch(0.66 0.20 31);
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ background:#0a0d0f; }

  /* Exact LinkedIn company banner canvas */
  .banner{
    position:relative;
    width:1584px;
    height:396px;
    background:
      radial-gradient(120% 140% at 88% 50%, oklch(0.18 0.012 220) 0%, var(--obsidian) 55%),
      var(--obsidian);
    overflow:hidden;
    font-family:'Archivo', system-ui, sans-serif;
    color:var(--bone);
  }

  /* Faint trajectory field on the right — "precision in motion" motif */
  .field{ position:absolute; inset:0; opacity:0.5; }
  .field line{ stroke:var(--steel); stroke-width:1; opacity:0.10; }
  .field .arc{ fill:none; stroke:var(--steel); stroke-width:1.25; opacity:0.14; }
  .field .way{ fill:var(--vermilion); opacity:0.85; }

  /* Left safe zone: LinkedIn overlaps the bottom-left with the logo avatar,
     so keep text in the upper/center band and away from the far-left corner. */
  .content{
    position:absolute;
    left:120px;
    top:0;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:22px;
    z-index:2;
  }

  .lockup{ display:flex; align-items:center; gap:22px; }
  .mark{ width:66px; height:66px; color:var(--bone); }
  .wordmark{
    font-weight:800;
    font-size:44px;
    letter-spacing:-0.02em;
    line-height:1;
  }
  .wordmark small{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-weight:500;
    font-size:13px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--steel);
    margin-top:9px;
  }

  .headline{
    font-weight:700;
    font-size:40px;
    line-height:1.08;
    letter-spacing:-0.02em;
    max-width:820px;
  }
  .headline .accent{ color:var(--vermilion); }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:12px;
    font-family:'IBM Plex Mono', monospace;
    font-weight:500;
    font-size:14px;
    letter-spacing:0.34em;
    text-transform:uppercase;
    color:var(--steel);
  }
  .eyebrow .tick{
    width:10px; height:10px;
    background:var(--vermilion);
    /* forward-pointing wedge = the Raptor Cut */
    clip-path:polygon(0 0, 100% 50%, 0 100%);
  }

  /* Thin vermilion baseline rule anchoring the composition */
  .rule{
    position:absolute;
    left:120px; right:120px; bottom:54px;
    height:2px;
    background:linear-gradient(90deg, var(--vermilion) 0%, var(--vermilion) 96px, oklch(0.27 0.01 220) 96px, oklch(0.27 0.01 220) 100%);
    opacity:0.9;
    z-index:2;
  }
</style>
</head>
<body>
  <div class="banner" id="banner">
    <!-- trajectory field -->
    <svg class="field" viewBox="0 0 1584 396" preserveAspectRatio="none">
      <path class="arc" d="M 980 470 Q 1300 210 1720 60" />
      <path class="arc" d="M 1040 500 Q 1360 250 1760 120" />
      <path class="arc" d="M 1120 520 Q 1440 300 1800 200" />
      <line x1="1180" y1="80" x2="1180" y2="330" />
      <line x1="1320" y1="60" x2="1320" y2="350" />
      <line x1="1460" y1="80" x2="1460" y2="330" />
      <circle class="way" cx="1300" cy="243" r="4.5" />
      <circle class="way" cx="1440" cy="205" r="3.5" />
    </svg>

    <div class="content">
      <span class="eyebrow"><span class="tick"></span> SDVOSB · Federal Cybersecurity · Est. 2015</span>

      <div class="lockup">
        <svg class="mark" viewBox="0 0 48 48" fill="none" aria-label="Raptor Solutions">
          <path fill="currentColor" d="M25 4 L44 44 H31.5 L24 27.8 L16.5 44 H4 L25 4 Z" />
          <path fill="oklch(0.66 0.2 31)" d="M25 4 L31.9 18.5 H18.1 L25 4 Z" />
        </svg>
        <div class="wordmark">RAPTOR SOLUTIONS<small>Precision in Motion</small></div>
      </div>

      <h1 class="headline">Securing federal missions —<br><span class="accent">CMMC, cloud, and cyber</span>, veteran-led.</h1>
    </div>

    <div class="rule"></div>
  </div>
</body>
</html>
